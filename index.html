<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<title>Cat lingo emoji</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{
  --bg:#0f0f0f;
  --panel:#1a1a1a;
  --card:#222;
  --accent:#4CAF50;
  --accent2:#00BCD4;
  --text:#fff;
  --text-sec:#aaa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:70px;
  overflow-x:hidden;
}
.header{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
}
.header h1{font-size:18px;font-weight:700}
.coins{
  background:rgba(0,0,0,0.3);
  padding:6px 12px;
  border-radius:20px;
  font-weight:600;
  font-size:14px;
}
.tab-content{display:none;padding:15px;max-width:800px;margin:0 auto}
.tab-content.active{display:block}
.capitol-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  margin-top:15px;
}
.capitol-card{
  background:var(--card);
  border-radius:12px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:transform 0.2s;
}
.capitol-card:active{transform:scale(0.95)}
.capitol-icona{font-size:40px;margin-bottom:8px}
.capitol-card h3{font-size:14px;margin-bottom:4px}
.capitol-card p{font-size:12px;color:var(--text-sec)}
.btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  font-size:15px;
}
.btn-sec{
  background:#333;
}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.emoji-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:15px 0;
}
.emoji-item{
  background:var(--card);
  border-radius:10px;
  padding:12px;
  text-align:center;
}
.emoji-large{font-size:42px;margin-bottom:6px}
.emoji-name{font-size:13px;font-weight:600}
.gremi-item{
  background:var(--card);
  border-radius:12px;
  padding:20px;
  margin-bottom:12px;
}
.sub-tabs{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.sub-tab-btn{
  padding:8px 16px;
  background:var(--panel);
  border:none;
  color:var(--text-sec);
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}
.sub-tab-btn.active{
  background:var(--accent);
  color:#fff;
}
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--panel);
  display:flex;
  justify-content:space-around;
  padding:8px 0;
  border-top:1px solid #333;
}
.nav-item{
  flex:1;
  text-align:center;
  padding:8px;
  color:var(--text-sec);
  cursor:pointer;
  font-size:12px;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:22px;display:block;margin-bottom:2px}
.modal{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding:20px;
}
.modal.hidden{display:none}
.modal-content{
  background:var(--panel);
  border-radius:16px;
  padding:25px;
  max-width:400px;
  width:100%;
  text-align:center;
}
.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <h1 id="app-titol">RPG Cròniques de Catalunya</h1>
  <div class="coins" id="coins">🪙 0 <span id="text-monedes">Monedes</span></div>
</div>

<!-- TAB MAPA -->
<div id="tab-mapa" class="tab-content">
  <div id="mapa"></div>
</div>

<!-- TAB MISSIO -->
<div id="tab-missio" class="tab-content">
  <div id="missio-contenidor"></div>
</div>

<!-- TAB GREMI -->
<div id="tab-gremi" class="tab-content">
  <div class="sub-tabs">
    <button class="sub-tab-btn" onclick="mostrarGremi('personatges', event)">Personatges</button>
    <button class="sub-tab-btn active" id="biblioteca-subtabs" onclick="mostrarBibliotecaTab('diccionari', event)">Biblioteca</button>
    <button class="sub-tab-btn" id="biblioteca-subtabs" onclick="mostrarBibliotecaTab('minijocs', event)">Minijocs</button>
  </div>
  <div id="gremi-contenidor"></div>
</div>

<!-- TAB LECTURA -->
<div id="tab-lectura" class="tab-content">
  <div id="lectura-contenidor"></div>
</div>

<!-- TAB TIPS -->
<div id="tab-tips" class="tab-content">
  <div id="tips-contenidor"></div>
</div>

<!-- TAB BOTIGA -->
<div id="tab-botiga" class="tab-content">
  <div class="capitol-grid" id="botiga-contenidor"></div>
</div>

<!-- NAV BAR -->
<div class="nav">
  <div class="nav-item" onclick="canviarTab('mapa', event)">
    <span class="nav-icon">🗺️</span>
    <span id="tab-mapa-txt">Món</span>
  </div>
  <div class="nav-item active" onclick="canviarTab('missio', event)">
    <span class="nav-icon">📜</span>
    <span id="tab-missio-txt">Missió</span>
  </div>
  <div class="nav-item" onclick="canviarTab('gremi', event)">
    <span class="nav-icon">🏰</span>
    <span id="tab-gremi-txt">Gremi</span>
  </div>
  <div class="nav-item" onclick="canviarTab('lectura', event)">
    <span class="nav-icon">📖</span>
    <span id="tab-lectura-txt">Lectura</span>
  </div>
  <div class="nav-item" onclick="canviarTab('tips', event)">
    <span class="nav-icon">💡</span>
    <span id="tab-tips-txt">Tips</span>
  </div>
  <div class="nav-item" onclick="canviarTab('botiga', event)">
    <span class="nav-icon">🛒</span>
    <span id="tab-botiga-txt">Botiga</span>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <p id="modalText"></p>
    <button class="btn" onclick="tancarModal()" style="margin-top:15px;">OK</button>
  </div>
</div>

<!-- SCRIPTS EN ORDRE -->
<script src="./data/lectura-content.js"></script>
<script src="./data/lectura-generator.js"></script>
<script src="./data/tips-content.js"></script>
<script src="./data/tips-generator.js"></script>
<script src="./main.js"></script>

</body>
</html>
